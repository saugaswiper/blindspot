name: Loop — Planner (sonnet)

on:
  schedule:
    - cron: "7 15 * * 1"   # Mon 15:07 UTC — adjust to your timezone
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: blindspot-loop
  cancel-in-progress: false

jobs:
  planner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Clone wiki for context (read)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WIKI_DEPLOY_KEY }}" > ~/.ssh/wiki && chmod 600 ~/.ssh/wiki
          GIT_SSH_COMMAND="ssh -i ~/.ssh/wiki -o StrictHostKeyChecking=no" \
            git clone --depth 1 git@github.com:saugaswiper/blindspot-wiki.git wiki
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Claude Code
        run: npm i -g @anthropic-ai/claude-code
      - name: Run Planner routine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "$(cat .github/loop/planner-prompt.md)" \
            --model claude-sonnet-4-6 \
            --permission-mode acceptEdits \
            --allowedTools "Bash,Read,Edit,Write,Glob,Grep"
      - name: Open PR if a new brief was written
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "blindspot-planner-bot"
          git config user.email "planner-bot@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then echo "No new brief."; exit 0; fi
          BRANCH="loop/brief-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "loop(planner): new milestone brief"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "loop(planner): new milestone brief" \
            --body "Autonomous planner routine wrote spec/briefs/. Review before the dev loop picks it up."
