name: Loop — Dev (opus)

on:
  schedule:
    - cron: "7 16 * * *"   # 16:07 UTC daily — adjust to your timezone
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: blindspot-loop      # serialize all loop jobs (avoid hot-file conflicts)
  cancel-in-progress: false

jobs:
  dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone wiki for context (read)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WIKI_DEPLOY_KEY }}" > ~/.ssh/wiki && chmod 600 ~/.ssh/wiki
          GIT_SSH_COMMAND="ssh -i ~/.ssh/wiki -o StrictHostKeyChecking=no" \
            git clone --depth 1 git@github.com:saugaswiper/blindspot-wiki.git wiki

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Install Claude Code
        run: npm i -g @anthropic-ai/claude-code

      - name: Run Dev routine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "$(cat .github/loop/dev-prompt.md)" \
            --model claude-opus-4-8 \
            --permission-mode acceptEdits \
            --allowedTools "Bash,Read,Edit,Write,Glob,Grep"

      - name: Open PR if the routine produced changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "blindspot-dev-bot"
          git config user.email "dev-bot@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes this run."; exit 0
          fi
          BRANCH="loop/dev-$(date +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "loop(dev): automated improvement run"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "loop(dev): automated improvement run" \
            --body "Autonomous dev routine. Review gates in the handoff under spec/. Do not auto-merge."
