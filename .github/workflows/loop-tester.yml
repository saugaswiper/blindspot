name: Loop — Tester (sonnet)

on:
  schedule:
    - cron: "7 19 * * *"   # 19:07 UTC daily (after dev) — adjust to your timezone
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: blindspot-loop
  cancel-in-progress: false

jobs:
  tester:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Clone wiki for context (read)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WIKI_DEPLOY_KEY }}" > ~/.ssh/wiki && chmod 600 ~/.ssh/wiki
          GIT_SSH_COMMAND="ssh -i ~/.ssh/wiki -o StrictHostKeyChecking=no" \
            git clone --depth 1 git@github.com:saugaswiper/blindspot-wiki.git wiki
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Install Claude Code
        run: npm i -g @anthropic-ai/claude-code
      - name: Run Tester routine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
        run: |
          claude -p "$(cat .github/loop/tester-prompt.md)" \
            --model claude-sonnet-4-6 \
            --permission-mode acceptEdits \
            --allowedTools "Bash,Read,Edit,Write,Glob,Grep"
      - name: Open PR if a validation report was written
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "blindspot-tester-bot"
          git config user.email "tester-bot@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then echo "No validation output."; exit 0; fi
          BRANCH="loop/validation-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "loop(tester): validation report"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "loop(tester): validation report" \
            --body "Autonomous tester routine wrote spec/validation/. Findings drive claimed->verified in the wiki."
